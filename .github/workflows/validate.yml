name: Validate Configuration Files

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('node:fs').readFileSync('configs.manifest.json','utf8'))"

      - name: Verify directory structure from manifest
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const configs = JSON.parse(fs.readFileSync('configs.manifest.json', 'utf8'));
          const requiredPaths = [...configs.map((config) => config.key), 'scripts'];

          for (const target of requiredPaths) {
            if (!fs.existsSync(target) || !fs.statSync(target).isDirectory()) {
              console.error(`Missing required directory: ${target}`);
              process.exit(1);
            }
            console.log(`OK ${target}`);
          }
          EOF

      - name: Run installer tests
        run: npm test

      - name: Smoke-test installer dry run
        run: |
          mkdir -p /tmp/config-installer-smoke
          node scripts/install.mjs --all --dry-run --yes /tmp/config-installer-smoke
